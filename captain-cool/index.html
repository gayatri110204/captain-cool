<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain Cool - IPL Strategist</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Captain <span class="highlight">Cool</span></h1>
      <p class="subtitle">The Multi-Agent IPL Match Strategist</p>
    </header>

    <div class="grid">
      <!-- Input Form Column -->
      <section class="card">
        <h2 style="margin-bottom: 2rem; font-size: 1.75rem;">Match State</h2>
        
        <div class="form-grid">
          <div class="form-group full">
            <label>Gemini API Key (Required for Browser Mode)</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." />
          </div>

          <div class="form-group">
            <label>Team Batting</label>
            <input type="text" id="teamBatting" value="CSK" />
          </div>
          <div class="form-group">
            <label>Team Bowling</label>
            <input type="text" id="teamBowling" value="MI" />
          </div>
          
          <div class="form-group">
            <label>Innings</label>
            <select id="innings">
              <option value="1">1st Innings</option>
              <option value="2" selected>2nd Innings</option>
            </select>
          </div>
          <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
              <label>Over</label>
              <input type="number" id="over" value="18" />
            </div>
            <div style="flex: 1;">
              <label>Ball</label>
              <input type="number" id="ball" value="0" />
            </div>
          </div>

          <div class="form-group">
            <label>Score</label>
            <input type="number" id="score" value="165" />
          </div>
          <div class="form-group">
            <label>Wickets</label>
            <input type="number" id="wickets" value="6" />
          </div>

          <div class="form-group">
            <label>Striker</label>
            <input type="text" id="striker" value="MS Dhoni" />
          </div>
          <div class="form-group">
            <label>Non-Striker</label>
            <input type="text" id="nonStriker" value="Ravindra Jadeja" />
          </div>

          <div class="form-group full" id="targetGroup">
            <label>Target</label>
            <input type="number" id="target" value="190" />
          </div>

          <div class="form-group full">
            <label>Venue (Triggers Tool Call)</label>
            <input type="text" id="venue" value="Wankhede Stadium, Mumbai" />
          </div>

          <div class="form-group full">
            <label>Pitch & Conditions</label>
            <input type="text" id="pitchType" value="Flat, dew expected" />
          </div>

          <div class="form-group full">
            <label>Bowlers Remaining (Overs used)</label>
            <input type="text" id="bowlersOvers" value="Bumrah (3), Coetzee (3), Hardik (2), Chawla (4)" />
          </div>
          
          <div class="form-group">
            <label>Impact Player Available?</label>
            <select id="impactPlayer">
              <option value="Yes" selected>Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Match Phase Context</label>
            <select id="matchPhase">
              <option value="Powerplay">Powerplay</option>
              <option value="Middle Overs">Middle Overs</option>
              <option value="Death Overs" selected>Death Overs</option>
            </select>
          </div>

          <div class="form-group full">
            <label>Live Commentary / Recent Action</label>
            <input type="text" id="liveCommentary" value="Last 3 balls: W, 0, 1. Batsman struggling to read the slower bouncer." />
          </div>
        </div>

        <button class="btn" id="executeBtn">Execute Agent Strategy</button>
      </section>

      <!-- Results Column -->
      <section class="card" style="display: flex; flex-direction: column;">
        <h2 style="margin-bottom: 2rem; font-size: 1.75rem;">Agent Debate</h2>
        
        <div id="idleState" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted);">
          <span style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.5;">🏏</span>
          <p>System Idle.</p>
          <p style="font-size: 0.9rem; margin-top: 0.5rem; text-align: center;">Enter match details and your API key to begin.</p>
        </div>

        <div id="loadingState" class="loading-container" style="display: none; flex: 1;">
          <div class="radar"></div>
          <span class="loading-text" id="loadingText">Initializing Gemini Agents...</span>
        </div>

        <div id="errorState" style="display: none; color: var(--danger); padding: 1.5rem; background: rgba(239,68,68,0.1); border-radius: 1rem; border: 1px solid rgba(239,68,68,0.3);">
          <strong id="errorMsg">Error: Something went wrong</strong>
        </div>

        <div id="resultsState" class="agent-list" style="display: none;">
          <div class="agent-output">
            <div class="agent-header analyst">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
              Stats Analyst (Tool Data)
            </div>
            <div class="agent-body" id="resAnalyst"></div>
          </div>

          <div class="agent-output">
            <div class="agent-header strategist">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
              Strategist Proposal
            </div>
            <div class="agent-body" id="resStrategist"></div>
          </div>

          <div class="agent-output">
            <div class="agent-header advocate">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
              Devil's Advocate Critique
            </div>
            <div class="agent-body" id="resAdvocate"></div>
          </div>

          <div class="agent-output captain-card">
            <div class="agent-header captain">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
              Final Captain's Decision
            </div>
            <div class="agent-body captain-body" id="resCaptain"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
